[project]
name = "bli-cli"
version = "0.1.0"
description = "bli CLIクライアント（Typer）。Blenderアドオンに接続して操作を送る。"
requires-python = ">=3.10"
dependencies = [
    "typer>=0.12",
    "pydantic>=2.6",
    "bli-core",
]

[project.scripts]
bli = "bli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bli"]
