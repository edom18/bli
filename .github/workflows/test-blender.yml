name: test-blender

on: [push, pull_request]

jobs:
  # L1 純ユニット + lint + AST guard + L3 プロトコル E2E + schema snapshot（全 PR ゲート / bpy 不要）
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Sync
        run: uv sync
      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: AST guard (生 bpy.ops 禁止)
        run: uv run python scripts/check_no_raw_bpy_ops.py packages/bli-addon/src
      - name: Type check (pyright)
        run: uv run pyright
      - name: Unit (L1) + protocol E2E (L3) + schema snapshot (M12 T12.3)
        run: uv run pytest

  # L2 bpy 統合（5.0 主軸＝必須ゲート / 4.4 ベストエフォート）。M13 T13.1。
  # golden smoke（3シナリオ + 主要編集の数値検証）と bl_rna 契約テストを実機 Blender で走らせる。
  bpy-integration:
    needs: unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        blender-version: ["5.0", "4.4"]
    # 5.0 は必須ゲート（失敗でワークフロー赤）、4.4 はベストエフォート（失敗を許容）。
    continue-on-error: ${{ matrix.blender-version == '4.4' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Blender ${{ matrix.blender-version }}
        uses: BradyAJohnston/setup-blender@v5
        with:
          version: ${{ matrix.blender-version }}
      - name: Golden smoke (L2 統合 + 3シナリオ golden / M13 T13.3)
        shell: bash
        run: |
          blender --background --python packages/bli-addon/spikes/smoke_ops.py 2>&1 | tee smoke.log
          grep -q "OPS SMOKE OK" smoke.log || { echo "::error::OPS SMOKE が OK で終わっていない"; exit 1; }
      - name: bl_rna 契約テスト (operator 実在・引数 / M13 T13.2)
        run: blender --background --python packages/bli-addon/spikes/contract_check.py
      - name: Vendored 配布スモーク (zip ビルド→展開→vendored bli_core で実機疎通 / M14 T14.2)
        shell: bash
        run: |
          blender --background --python packages/bli-addon/spikes/vendored_smoke.py 2>&1 | tee vendored.log
          grep -q "VENDORED SMOKE OK" vendored.log || { echo "::error::VENDORED SMOKE が OK で終わっていない"; exit 1; }
